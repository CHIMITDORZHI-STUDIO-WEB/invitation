<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение 55</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #b8a888;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
    font-family: 'Playfair Display', serif;
  }
  .card {
    width: 420px;
    background: linear-gradient(160deg, #fefaf0 0%, #f9f1d8 55%, #fefae8 100%);
    position: relative;
    overflow: hidden;
    padding: 52px 50px 48px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    box-shadow: 0 28px 70px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.1);
  }

  /* Мраморные прожилки */
  .marble {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0.15; pointer-events: none;
  }

  /* Двойная рамка */
  .frame {
    position: absolute;
    top: 14px; bottom: 14px; left: 14px; right: 14px;
    border: 1.5px solid rgba(175,125,15,0.55);
    pointer-events: none;
  }
  .frame::before {
    content:''; position:absolute; inset:7px;
    border: 1px solid rgba(175,125,15,0.22);
  }

  /* Угловые ромбы */
  .cd { position:absolute; width:10px; height:10px; background:#c8920a; transform:rotate(45deg); }
  .cd-tl { top:9px; left:9px; } .cd-tr { top:9px; right:9px; }
  .cd-bl { bottom:9px; left:9px; } .cd-br { bottom:9px; right:9px; }

  /* Анимации */
  .fu { opacity:0; transform:translateY(14px); animation: fu 0.85s ease forwards; }
  @keyframes fu { to { opacity:1; transform:translateY(0); } }
  .d1{animation-delay:.1s} .d2{animation-delay:.3s} .d3{animation-delay:.5s}
  .d4{animation-delay:.7s} .d5{animation-delay:.9s} .d6{animation-delay:1.1s}
  .d7{animation-delay:1.3s} .d8{animation-delay:1.5s}

  .number {
    font-family:'Cinzel',serif; font-size:100px; font-weight:600; line-height:1;
    background: linear-gradient(170deg,#f2d858 0%,#c8920a 48%,#7a5200 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:12px;
    filter: drop-shadow(0 2px 8px rgba(180,130,10,0.2));
  }
  .top-label {
    font-family:'Cinzel',serif; font-size:10px;
    letter-spacing:5px; color:#9a6e10; text-transform:uppercase; margin-top:5px;
  }
  .div {
    width:195px; height:1px;
    background: linear-gradient(to right,transparent,#c8920a,transparent);
    margin:14px auto; position:relative; flex-shrink:0;
  }
  .div::before {
    content:'◆'; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); color:#c8920a; font-size:7px;
    background: #fdf6e4; padding:0 7px;
  }

  .poem {
    font-size:17.5px; font-style:italic;
    color:#2e1e00; line-height:1.85; max-width:295px;
  }

  .date-wrap {
    width:100%; max-width:275px;
    border:1.5px solid rgba(180,130,20,0.55);
    padding:14px 28px; background:rgba(200,146,10,0.04);
    position:relative;
  }
  .date-wrap::before {
    content:''; position:absolute; top:-5px; left:-5px;
    width:10px; height:10px;
    border-top:1.5px solid #c8920a; border-left:1.5px solid #c8920a;
    background:#fdf6e4;
  }
  .date-wrap::after {
    content:''; position:absolute; bottom:-5px; right:-5px;
    width:10px; height:10px;
    border-bottom:1.5px solid #c8920a; border-right:1.5px solid #c8920a;
    background:#fdf6e4;
  }
  .date-main { font-family:'Cinzel',serif; font-size:21px; font-weight:600; color:#2e1e00; letter-spacing:2px; }
  .date-time { font-family:'Cinzel',serif; font-size:13px; color:#9a6e10; letter-spacing:4px; margin-top:5px; }

  .address { font-size:14.5px; color:#5a3e10; line-height:1.85; }
  .address em { color:#2e1e00; font-style:italic; font-size:16px; }
  .closing { font-size:18px; font-style:italic; color:#9a6e10; }
  .orn { opacity:.55; margin-top:5px; }
</style>
</head>
<body>
<div class="card">

  <!-- Мраморные прожилки -->
  <svg class="marble" viewBox="0 0 420 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs><filter id="mb"><feGaussianBlur stdDeviation="3.5"/></filter></defs>
    <path d="M0,100 Q90,80 150,150 Q210,220 320,175 Q385,148 420,195" stroke="#b8922a" stroke-width="2" fill="none" filter="url(#mb)"/>
    <path d="M0,100 Q90,80 150,150 Q210,220 320,175 Q385,148 420,195" stroke="#b8922a" stroke-width="0.7" fill="none"/>
    <path d="M60,0 Q95,90 75,180 Q55,260 115,340 Q165,405 135,495 Q105,570 148,650 Q165,685 185,700" stroke="#9a7220" stroke-width="1.5" fill="none" filter="url(#mb)"/>
    <path d="M60,0 Q95,90 75,180 Q55,260 115,340 Q165,405 135,495 Q105,570 148,650 Q165,685 185,700" stroke="#9a7220" stroke-width="0.55" fill="none"/>
    <path d="M420,60 Q355,130 375,235 Q395,325 335,400 Q275,460 305,555 Q325,615 285,700" stroke="#c8a030" stroke-width="1.2" fill="none" filter="url(#mb)"/>
    <path d="M420,60 Q355,130 375,235 Q395,325 335,400 Q275,460 305,555 Q325,615 285,700" stroke="#c8a030" stroke-width="0.45" fill="none"/>
    <path d="M0,400 Q65,368 125,410 Q205,462 285,425 Q355,390 420,435" stroke="#b8922a" stroke-width="1" fill="none" filter="url(#mb)"/>
    <path d="M210,0 Q225,65 195,145 Q165,215 205,295" stroke="#9a7220" stroke-width="0.8" fill="none"/>
  </svg>

  <!-- Рамка и ромбы -->
  <div class="frame"></div>
  <div class="cd cd-tl"></div><div class="cd cd-tr"></div>
  <div class="cd cd-bl"></div><div class="cd cd-br"></div>

  <!-- КОНТЕНТ -->
  <div class="fu top-label d1">Юбилей</div>
  <div class="fu number d2">55</div>
  <div class="fu div d2"></div>

  <p class="fu poem d3">
    Говорят, в 55 жизнь<br>
    только начинается.<br>
    Я решила проверить это лично —<br>
    и приглашаю Вас разделить!
  </p>

  <div class="fu div d4"></div>

  <div style="margin-top:4px;width:100%;display:flex;justify-content:center;" class="fu d5">
    <div class="date-wrap">
      <div class="date-main">7 апреля 2026</div>
      <div class="date-time">в 15 : 00</div>
    </div>
  </div>

  <div class="fu div d5"></div>

  <div class="fu address d6">
    г. Чита, ул. Генерала Белика, 14<br>
    <em>Ресторан «Элит»</em>
  </div>

  <div class="fu div d6"></div>

  <div class="fu closing d7">Буду рада видеть Вас рядом!</div>

  <div class="fu orn d8">
    <svg width="140" height="20" viewBox="0 0 140 20" fill="none">
      <line x1="0" y1="10" x2="54" y2="10" stroke="#c8920a" stroke-width="1"/>
      <polygon points="58,3 65,10 58,17 51,10" fill="#c8920a"/>
      <polygon points="65,5 72,10 65,15 58,10" fill="none" stroke="#c8920a" stroke-width="0.8" opacity="0.5"/>
      <polygon points="72,3 79,10 72,17 79,10" fill="#c8920a"/>
      <line x1="83" y1="10" x2="140" y2="10" stroke="#c8920a" stroke-width="1"/>
    </svg>
  </div>

</div>
</body>
</html>
