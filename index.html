<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение 55</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(160deg, #fefaf0 0%, #f9f1d8 55%, #fefae8 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    font-family: 'Playfair Display', serif;
  }
  .card {
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(160deg, #fefaf0 0%, #f9f1d8 55%, #fefae8 100%);
    position: relative;
    overflow: hidden;
    padding: 52px 50px 48px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Мраморные прожилки */
  .marble {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0.15; pointer-events: none;
  }

  /* Двойная рамка */
  .frame {
    position: absolute;
    top: 14px; bottom: 14px; left: 14px; right: 14px;
    border: 1.5px solid rgba(175,125,15,0.55);
    pointer-events: none;
  }
  .frame::before {
    content:''; position:absolute; inset:7px;
    border: 1px solid rgba(175,125,15,0.22);
  }

  /* Угловые ромбы */
  .cd { position:absolute; width:10px; height:10px; background:#c8920a; transform:rotate(45deg); }
  .cd-tl { top:9px; left:9px; } .cd-tr { top:9px; right:9px; }
  .cd-bl { bottom:9px; left:9px; } .cd-br { bottom:9px; right:9px; }

  /* Анимации */
  .fu { opacity:0; transform:translateY(14px); animation: fu 0.85s ease forwards; }
  @keyframes fu { to { opacity:1; transform:translateY(0); } }
  .d1{animation-delay:.1s} .d2{animation-delay:.3s} .d3{animation-delay:.5s}
  .d4{animation-delay:.7s} .d5{animation-delay:.9s} .d6{animation-delay:1.1s}
  .d7{animation-delay:1.3s} .d8{animation-delay:1.5s} .d9{animation-delay:1.7s}

  .number { line-height:1; }
  .number img { width:220px; height:auto; display:block; }
  .top-label {
    font-family:'Cinzel',serif; font-size:10px;
    letter-spacing:5px; color:#9a6e10; text-transform:uppercase; margin-top:5px;
  }
  .div {
    width:195px; height:1px;
    background: linear-gradient(to right,transparent,#c8920a,transparent);
    margin:14px auto; position:relative; flex-shrink:0;
  }
  .div::before {
    content:'◆'; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); color:#c8920a; font-size:7px;
    background: #fdf6e4; padding:0 7px;
  }

  .text {
    font-size:17px; font-style:italic;
    color:#2e1e00; line-height:1.85; max-width:295px;
  }
  .orn { opacity:.55; margin-top:5px; }
  .confirm-btn {
    display:inline-block; margin-top:18px;
    padding:14px 40px;
    background: linear-gradient(135deg, #c8920a 0%, #a87508 100%);
    color:#fff; font-family:'Playfair Display',serif; font-size:16px;
    font-style:italic; letter-spacing:1px;
    text-decoration:none; border:none; cursor:pointer;
    border-radius:4px;
    box-shadow: 0 4px 14px rgba(168,117,8,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .confirm-btn:hover {
    transform:translateY(-2px);
    box-shadow: 0 6px 20px rgba(168,117,8,0.45);
  }
  .confirm-btn:active { transform:translateY(0); }

  /* Мобильная адаптация */
  @media (max-width: 480px) {
    body { padding: 0; }
    .card { width: 100%; min-height: 100vh; padding: 36px 24px 32px; }
    .number img { width: 170px; }
    .text { font-size: 15px; max-width: 100%; }
    .div { width: 150px; }
    .frame { top: 10px; bottom: 10px; left: 10px; right: 10px; }
  }
</style>
</head>
<body>
<div class="card">
