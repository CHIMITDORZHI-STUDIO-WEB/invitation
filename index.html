<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение на юбилей</title>
<meta property="og:title" content="Приглашение на юбилей Оюны Шираповны 🎉">
<meta property="og:description" content="Дарижапова Оюна Шираповна приглашает Вас на праздничный вечер по случаю своего юбилея. 11 апреля 2026 года.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://chimitdorzhi-studio-web.github.io/invitation/">
<meta property="og:image" content="https://chimitdorzhi-studio-web.github.io/invitation/основной.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #2a1248;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Playfair Display', serif;
  }
  .hero {
    width: 100%;
    max-width: 600px;
  }
  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Форма */
  .form-wrap {
    width: 100%;
    max-width: 600px;
    background: linear-gradient(180deg, #2a1248 0%, #1e0d35 100%);
    padding: 30px 28px 44px;
    animation: fadeUp 0.85s ease 0.3s both;
  }
  .form-title {
    text-align: center;
    color: #d4af37;
    font-size: 22px;
    font-style: italic;
    margin-bottom: 24px;
  }

  /* Выбор количества */
  .guest-count {
    text-align: center;
    margin-bottom: 22px;
  }
  .guest-count label {
    color: #f0e6d0;
    font-size: 18px;
    display: block;
    margin-bottom: 12px;
  }
  .count-btns {
    display: flex;
    justify-content: center;
    gap: 14px;
  }
  .count-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid #d4af37;
    background: transparent;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
  }
  .count-btn.active {
    background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
    color: #2a1248;
    box-shadow: 0 0 16px rgba(212,175,55,0.4);
  }
  .count-btn:hover:not(.active) {
    background: rgba(212,175,55,0.15);
  }

  /* Поля ввода */
  .fields { margin-bottom: 22px; }
  .field-group {
    margin-bottom: 14px;
  }
  .field-group label {
    display: block;
    color: #d4af37;
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .field-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid rgba(212,175,55,0.4);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: #f0e6d0;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.25s;
  }
  .field-group input::placeholder {
    color: rgba(240,230,208,0.35);
  }
  .field-group input:focus {
    border-color: #d4af37;
    background: rgba(255,255,255,0.1);
  }
  #guest2-group {
    display: none;
  }

  /* Кнопка */
  .confirm-btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
    color: #2a1248;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    font-weight: 700;
    letter-spacing: 1px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 4px 18px rgba(212,175,55,0.4);
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  }
  .confirm-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(212,175,55,0.55);
  }
  .confirm-btn:active { transform: translateY(0); }
  .confirm-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Сообщение об успехе */
  .success-msg {
    display: none;
    text-align: center;
    padding: 30px 20px;
  }
  .success-msg h3 {
    color: #d4af37;
    font-size: 26px;
    font-style: italic;
    margin-bottom: 10px;
  }
  .success-msg p {
    color: #f0e6d0;
    font-size: 18px;
    line-height: 1.6;
  }

  /* Ошибка */
  .error-msg {
    display: none;
    text-align: center;
    color: #ff6b6b;
    font-size: 14px;
    margin-bottom: 14px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .form-wrap { padding: 24px 18px 36px; }
    .confirm-btn { font-size: 19px; }
    .form-title { font-size: 20px; }
  }
</style>
</head>
<body>

  <div class="hero">
    <img src="основной.png" alt="Приглашение на юбилей — 55 лет">
  </div>

  <div class="form-wrap">
    <div class="form-title">Подтвердите присутствие</div>

    <form id="rsvpForm">
      <div class="guest-count">
        <label>Сколько вас будет?</label>
        <div class="count-btns">
          <button type="button" class="count-btn active" data-count="1">1</button>
          <button type="button" class="count-btn" data-count="2">2</button>
        </div>
      </div>

      <div class="fields">
        <div class="field-group" id="guest1-group">
          <label>ФИО гостя</label>
          <input type="text" id="guest1" placeholder="Иванов Иван Иванович" required>
        </div>
        <div class="field-group" id="guest2-group">
          <label>ФИО второго гостя</label>
          <input type="text" id="guest2" placeholder="Иванова Мария Петровна">
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="confirm-btn" id="submitBtn">Подтвердить</button>
    </form>

    <div class="success-msg" id="successMsg">
      <h3>Спасибо!</h3>
      <p>Ваше присутствие подтверждено.<br>Ждём вас на празднике!</p>
    </div>
  </div>

<script>
  // === НАСТРОЙКА ===
  // Вставьте сюда URL вашего Google Apps Script (см. инструкцию ниже)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyaq2A4rTIMdaiENdfkzvCaBazaQkv-9DHioBhKwNRuGziFDms6umdwvM9alw2-dYuo/exec';
  // =================

  let guestCount = 1;

  // Выбор количества гостей
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      guestCount = parseInt(btn.dataset.count);
      const g2 = document.getElementById('guest2-group');
      const g2input = document.getElementById('guest2');
      if (guestCount === 2) {
        g2.style.display = 'block';
        g2input.required = true;
      } else {
        g2.style.display = 'none';
        g2input.required = false;
        g2input.value = '';
      }
    });
  });

  // Отправка формы
  document.getElementById('rsvpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');
    const guest1 = document.getElementById('guest1').value.trim();
    const guest2 = document.getElementById('guest2').value.trim();

    // Валидация
    if (!guest1) {
      errorEl.textContent = 'Пожалуйста, введите ФИО';
      errorEl.style.display = 'block';
      return;
    }
    if (guestCount === 2 && !guest2) {
      errorEl.textContent = 'Пожалуйста, введите ФИО второго гостя';
      errorEl.style.display = 'block';
      return;
    }

    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Отправка...';

    const params = new URLSearchParams({
      count: guestCount,
      guest1: guest1,
      guest2: guestCount === 2 ? guest2 : '',
      date: new Date().toLocaleString('ru-RU')
    });

    try {
      await fetch(SCRIPT_URL + '?' + params.toString(), {
        method: 'GET',
        mode: 'no-cors'
      });

      document.getElementById('rsvpForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    } catch (err) {
      errorEl.textContent = 'Ошибка отправки. Попробуйте ещё раз.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Подтвердить';
    }
  });
</script>

</body>
</html>
