<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение на юбилей</title>
<meta property="og:title" content="Приглашение на юбилей Оюны Шираповны 🎉">
<meta property="og:description" content="Дарижапова Оюна Шираповна приглашает Вас на праздничный вечер по случаю своего юбилея. 11 апреля 2026 года.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://chimitdorzhi-studio-web.github.io/invitation/">
<meta property="og:image" content="https://chimitdorzhi-studio-web.github.io/invitation/основной.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #2a1248;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Playfair Display', serif;
  }
  .hero {
    width: 100%;
    max-width: 600px;
    position: relative;
  }
  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }
  .btn-wrap {
    width: 100%;
    max-width: 600px;
    background: linear-gradient(180deg, #2a1248 0%, #1e0d35 100%);
    padding: 28px 24px 40px;
    text-align: center;
  }
  .confirm-btn {
    display: inline-block;
    padding: 16px 44px;
    background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
    color: #2a1248;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    font-weight: 700;
    letter-spacing: 1px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 18px rgba(212,175,55,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.85s ease 0.5s both;
  }
  .confirm-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(212,175,55,0.55);
  }
  .confirm-btn:active { transform: translateY(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .confirm-btn { font-size: 19px; padding: 14px 36px; }
  }
</style>
</head>
<body>

  <div class="hero">
    <img src="основной.png" alt="Приглашение на юбилей — 55 лет">
  </div>

  <div class="btn-wrap">
    <a href="https://forms.yandex.ru/u/69c0b8fee010dbd88dcb67bd/" target="_blank" class="confirm-btn">Подтвердить присутствие</a>
  </div>

</body>
</html>
